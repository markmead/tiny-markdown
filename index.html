<!doctype html>
<html
  lang="en"
  x-data="{ darkMode: $persist(window.matchMedia('(prefers-color-scheme: dark)').matches) }"
  :class="{ 'dark': darkMode }"
>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tiny Markdown 🤏 | Online Markdown Editor</title>

    <meta
      name="description"
      content="Simple markdown editor in the browser for quick and easy markdown creation."
    />

    <link rel="icon" href="https://fav.farm/📝" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tiny-markdown.vercel.app/" />
    <meta
      property="og:title"
      content="Tiny Markdown 🤏 | Online Markdown Editor"
    />
    <meta
      property="og:description"
      content="Simple markdown editor in the browser for quick and easy markdown creation."
    />
    <meta property="og:image" content="/cover.jpg" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://tiny-markdown.vercel.app/" />
    <meta
      property="twitter:title"
      content="Tiny Markdown 🤏 | Online Markdown Editor"
    />
    <meta
      property="twitter:description"
      content="Simple markdown editor in the browser for quick and easy markdown creation."
    />
    <meta property="twitter:image" content="/cover.jpg" />

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3/dist/cdn.min.js"
    ></script>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"
    ></script>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3/dist/purify.min.js"></script>

    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        plugins: [
          function ({ addVariant }) {
            addVariant(
              'prose-checkbox',
              '&.prose :where(input[type="checkbox"])',
            )
          },
        ],
      }
    </script>
  </head>
  <body
    x-data="fakeCms"
    x-effect="refreshHtml"
    class="dark:bg-[#111] bg-[#FAFAFA]"
  >
    <main>
      <div
        class="grid min-h-screen grid-cols-1 lg:grid-cols-2 lg:align-start"
        :class="{ 'lg:grid-cols-1': isFullscreen }"
      >
        <div
          class="flex flex-col px-4 py-8 overflow-auto sm:px-6 lg:px-8 lg:py-12 lg:h-screen"
          :class="{ 'max-w-5xl mx-auto w-full': isFullscreen }"
        >
          <div
            class="flex flex-col sm:flex-row gap-4 sm:items-center sm:justify-between"
          >
            <h1 class="text-lg font-bold dark:text-white">
              Tiny Markdown
              <span aria-hidden="true"> 🤏 </span>
            </h1>

            <div class="flex gap-4">
              <div :class="toolbarGroupClass">
                <div class="relative">
                  <button
                    @click="toggleRevisionMenu"
                    @keydown.escape.prevent="closeRevisionMenu"
                    x-ref="revisionMenuTrigger"
                    id="revision-menu-button"
                    aria-haspopup="menu"
                    :aria-expanded="showRevisionMenu"
                    aria-controls="revision-menu"
                    aria-label="Open revision history"
                    :class="menuTriggerButtonClass"
                  >
                    <span
                      class="text-xs font-medium"
                      x-text="selectedRevisionLabel"
                    ></span>

                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="size-4"
                    >
                      <path d="m6 9 6 6 6-6" />
                    </svg>
                  </button>

                  <div
                    id="revision-menu"
                    class="absolute right-0 z-10 w-56 mt-4 origin-top-right border rounded-md max-h-56 overflow-auto"
                    :class="surfacePanelClass"
                    role="menu"
                    aria-labelledby="revision-menu-button"
                    x-show="showRevisionMenu"
                    x-cloak
                    @click.away="closeRevisionMenu(false)"
                    @keydown.escape.prevent="closeRevisionMenu"
                  >
                    <template x-if="contentRevisions.length">
                      <ul class="p-2" role="none">
                        <template
                          x-for="contentRevision in contentRevisions"
                          :key="contentRevision.revisionKey"
                        >
                          <li
                            class="flex justify-between p-2 items-center font-medium hover:dark:bg-[#111] hover:bg-[#FAFAFA] rounded-md"
                            role="none"
                          >
                            <button
                              @click="selectRevision(contentRevision.revisionKey, contentRevision.revisionLabel)"
                              role="menuitem"
                              class="leading-none transition hover:text-pink-500 focus:outline-none focus:text-pink-500 focus:dark:text-pink-500 text-xs font-medium"
                              x-text="contentRevision.revisionLabel"
                            ></button>

                            <button
                              @click="removeRevision(contentRevision.revisionKey)"
                              role="menuitem"
                              aria-label="Delete revision"
                              class="transition hover:text-pink-500 focus:outline-none focus:text-pink-500 focus:dark:text-pink-500"
                            >
                              <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="size-4"
                              >
                                <path d="M10 11v6" />
                                <path d="M14 11v6" />
                                <path
                                  d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"
                                />
                                <path d="M3 6h18" />
                                <path
                                  d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                                />
                              </svg>
                            </button>
                          </li>
                        </template>
                      </ul>
                    </template>

                    <template x-if="! contentRevisions.length">
                      <div
                        class="p-4 text-xs font-medium dark:text-white text-black text-center"
                      >
                        Nothing to see here...
                      </div>
                    </template>

                    <div
                      class="p-2 border-t border-[#EAEAEA] dark:border-[#333]"
                    >
                      <button
                        class="flex items-center gap-2 p-2 text-red-600 transition font-medium focus:outline-none focus:ring-1 focus:ring-pink-500 hover:border-pink-500 focus:border-pink-500 focus:dark:border-pink-500 focus:ring-inset hover:dark:bg-[#111] w-full rounded-md hover:bg-[#FAFAFA]"
                        @click="removeAllRevisions"
                        role="menuitem"
                        aria-label="Delete all revisions"
                      >
                        <svg
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          class="size-4"
                        >
                          <path d="M10 11v6" />
                          <path d="M14 11v6" />
                          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                          <path d="M3 6h18" />
                          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>

                        <span class="text-xs font-medium">
                          Delete Revisions
                        </span>
                      </button>
                    </div>
                  </div>
                </div>

                <button
                  @click="saveRevision"
                  aria-label="Save revision"
                  :class="toolbarButtonClass"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path
                      d="M17 3a2 2 0 0 1 2 2v15a1 1 0 0 1-1.496.868l-4.512-2.578a2 2 0 0 0-1.984 0l-4.512 2.578A1 1 0 0 1 5 20V5a2 2 0 0 1 2-2z"
                    />
                  </svg>
                </button>
              </div>

              <div :class="toolbarGroupClass">
                <button
                  @click="openSearchPanel"
                  aria-label="Search and replace"
                  :class="toolbarButtonClass"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                  </svg>
                </button>

                <button
                  @click="showLineNumbers = !showLineNumbers"
                  :aria-label="showLineNumbers ? 'Hide line numbers' : 'Show line numbers'"
                  :aria-pressed="showLineNumbers"
                  :class="toolbarButtonClass"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <line x1="10" x2="21" y1="6" y2="6" />
                    <line x1="10" x2="21" y1="12" y2="12" />
                    <line x1="10" x2="21" y1="18" y2="18" />
                    <path d="M4 6h1v4" />
                    <path d="M4 10h2" />
                    <path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1" />
                  </svg>
                </button>

                <button
                  @click="darkMode = !darkMode"
                  aria-label="Toggle dark mode"
                  :class="toolbarButtonClass"
                >
                  <svg
                    x-cloak
                    x-show="darkMode"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <circle cx="12" cy="12" r="4" />
                    <path d="M12 2v2" />
                    <path d="M12 20v2" />
                    <path d="m4.93 4.93 1.41 1.41" />
                    <path d="m17.66 17.66 1.41 1.41" />
                    <path d="M2 12h2" />
                    <path d="M20 12h2" />
                    <path d="m6.34 17.66-1.41 1.41" />
                    <path d="m19.07 4.93-1.41 1.41" />
                  </svg>

                  <svg
                    x-cloak
                    x-show="!darkMode"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path
                      d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
                    />
                  </svg>
                </button>

                <div class="hidden lg:block">
                  <button
                    @click="toggleFullscreen"
                    aria-label="Toggle full screen mode"
                    :class="toolbarButtonClass"
                  >
                    <svg
                      x-cloak
                      x-show="isFullscreen"
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="size-4"
                    >
                      <path d="m15 15 6 6m-6-6v4.8m0-4.8h4.8" />
                      <path d="M9 19.8V15m0 0H4.2M9 15l-6 6" />
                      <path d="M15 4.2V9m0 0h4.8M15 9l6-6" />
                      <path d="M9 4.2V9m0 0H4.2M9 9 3 3" />
                    </svg>

                    <svg
                      x-cloak
                      x-show="!isFullscreen"
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="size-4"
                    >
                      <path d="m15 15 6 6" />
                      <path d="m15 9 6-6" />
                      <path d="M21 16v5h-5" />
                      <path d="M21 8V3h-5" />
                      <path d="M3 16v5h5" />
                      <path d="m3 21 6-6" />
                      <path d="M3 8V3h5" />
                      <path d="M9 9 3 3" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div
            class="flex justify-between gap-4 overflow-auto [&::-webkit-scrollbar]:hidden mt-4"
          >
            <div class="flex gap-4">
              <div :class="toolbarGroupClass">
                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('# ')"
                  aria-label="Heading one"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path d="M4 12h8" />
                    <path d="M4 18V6" />
                    <path d="M12 18V6" />
                    <path d="m17 12 3-2v8" />
                  </svg>
                </button>

                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('## ')"
                  aria-label="Heading two"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path d="M4 12h8" />
                    <path d="M4 18V6" />
                    <path d="M12 18V6" />
                    <path d="M21 18h-4c0-4 4-3 4-6 0-1.5-2-2.5-4-1" />
                  </svg>
                </button>

                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('### ')"
                  aria-label="Heading three"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path d="M4 12h8" />
                    <path d="M4 18V6" />
                    <path d="M12 18V6" />
                    <path d="M17.5 10.5c1.7-1 3.5 0 3.5 1.5a2 2 0 0 1-2 2" />
                    <path d="M17 17.5c2 1.5 4 .3 4-1.5a2 2 0 0 0-2-2" />
                  </svg>
                </button>
              </div>

              <div :class="toolbarGroupClass">
                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('**', '**')"
                  aria-label="Bold text"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path
                      d="M6 12h9a4 4 0 0 1 0 8H7a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h7a4 4 0 0 1 0 8"
                    />
                  </svg>
                </button>

                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('_', '_')"
                  aria-label="Italic text"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <line x1="19" x2="10" y1="4" y2="4" />
                    <line x1="14" x2="5" y1="20" y2="20" />
                    <line x1="15" x2="9" y1="4" y2="20" />
                  </svg>
                </button>

                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('~~', '~~')"
                  aria-label="Strikethrough text"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path d="M16 4H9a3 3 0 0 0-2.83 4" />
                    <path d="M14 12a4 4 0 0 1 0 8H6" />
                    <line x1="4" x2="20" y1="12" y2="12" />
                  </svg>
                </button>

                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('- ')"
                  aria-label="Bullet point"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path d="M11 5h10" />
                    <path d="M11 12h10" />
                    <path d="M11 19h10" />
                    <path d="M4 4h1v5" />
                    <path d="M4 9h2" />
                    <path
                      d="M6.5 20H3.4c0-1 2.6-1.925 2.6-3.5a1.5 1.5 0 0 0-2.6-1.02"
                    />
                  </svg>
                </button>

                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('1. ')"
                  aria-label="Numbered list"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path d="M11 5h10" />
                    <path d="M11 12h10" />
                    <path d="M11 19h10" />
                    <path d="M4 4h1v5" />
                    <path d="M4 9h2" />
                    <path
                      d="M6.5 20H3.4c0-1 2.6-1.925 2.6-3.5a1.5 1.5 0 0 0-2.6-1.02"
                    />
                  </svg>
                </button>

                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('> ')"
                  aria-label="Quote text"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path d="M17 5H3" />
                    <path d="M21 12H8" />
                    <path d="M21 19H8" />
                    <path d="M3 12v7" />
                  </svg>
                </button>

                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('- [ ] ')"
                  aria-label="Checkbox"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="m9 12 2 2 4-4" />
                  </svg>
                </button>
              </div>

              <div :class="toolbarGroupClass">
                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('`', '`')"
                  aria-label="Code text"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <path d="m16 18 6-6-6-6" />
                    <path d="m8 6-6 6 6 6" />
                  </svg>
                </button>

                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('```', '```')"
                  aria-label="Code block"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="m10 8 4 4-4 4" />
                  </svg>
                </button>

                <button
                  :class="toolbarButtonClass"
                  @click="modifyMarkdown('![](', ')')"
                  aria-label="Image"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="size-4"
                  >
                    <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                    <circle cx="9" cy="9" r="2" />
                    <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                  </svg>
                </button>
              </div>
            </div>

            <div :class="toolbarGroupClass">
              <button
                :class="toolbarButtonClass"
                @click="exportMarkdownDocument"
                aria-label="Export markdown"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="size-4"
                >
                  <path
                    d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"
                  />
                  <path d="M14 2v5a1 1 0 0 0 1 1h5" />
                  <path d="M12 18v-6" />
                  <path d="m9 15 3 3 3-3" />
                </svg>
              </button>

              <button
                :class="toolbarButtonClass"
                @click="copyMarkdown"
                aria-label="Copy markdown"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="size-4"
                >
                  <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
                  <path
                    d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                  />
                </svg>
              </button>

              <button
                :class="toolbarButtonClass"
                @click="refreshComponent"
                aria-label="Delete markdown"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="size-4"
                >
                  <path d="M10 11v6" />
                  <path d="M14 11v6" />
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                  <path d="M3 6h18" />
                  <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />

          <div class="flex-1 mt-4 flex flex-col gap-2">

              x-transition:leave-start="opacity-100"
              x-transition:leave-end="opacity-0"
              class="p-3 border rounded-xl flex flex-col gap-2"

              <div class="flex flex-wrap gap-2 items-center">
                <input

                />

                <input
                  type="text"
                  x-model="replaceTerm"
                  placeholder="Replace with..."
                  @keydown.escape.prevent="closeSearchPanel"
                  class="flex-1 min-w-0 h-8 px-3 rounded-lg text-xs border border-[#EAEAEA] dark:border-[#333] bg-white dark:bg-black dark:text-white focus:outline-none focus:ring-1 focus:ring-inset focus:ring-pink-500 focus:border-pink-500"
                />

                <div class="flex gap-1">
                  <button
                    @click="findNextMatch"
                    :class="searchActionButtonClass"
                    aria-label="Find next match"
                  >
                    Next
                  </button>

                  <button
                    @click="replaceCurrentMatch"
                    :class="searchActionButtonClass"
                    aria-label="Replace current match"

                    Replace
                  </button>

                  <button
                    @click="replaceAllMatches"
                    :class="searchActionButtonClass"
                    aria-label="Replace all matches"

                    All
                  </button>

                  <button
                    @click="closeSearchPanel"
                    :class="toolbarButtonClass"
                    aria-label="Close search panel"

                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"

                    >
                      <path d="M18 6 6 18" />
                      <path d="m6 6 12 12" />

                </div>
              </div>

              <p
                x-show="searchTerm"
                class="text-xs text-gray-500 dark:text-gray-400"
                x-text="matchCountText"
              ></p>
            </div>

            <div
              class="flex-1 relative flex rounded-xl border focus-within:border-pink-500 focus-within:ring-1 focus-within:ring-pink-500 focus-within:ring-inset"
              :class="surfacePanelClass"
            >
              <div
                x-show="showLineNumbers"
                x-cloak
                x-ref="lineNumbersGutter"
                class="select-none text-right leading-6 py-6 pl-2 pr-3 border-r border-[#EAEAEA] dark:border-[#333] text-gray-400 dark:text-gray-600 text-xs font-mono overflow-hidden"
                style="min-width: 2.5rem;"
                aria-hidden="true"
              >
                <template x-for="lineNum in editorLineNumbers" :key="lineNum">
                  <div class="leading-6" x-text="lineNum"></div>
                </template>
              </div>

              <textarea
                id="markdown-editor"
                aria-label="Markdown editor input"
                class="flex-1 p-6 pb-10 leading-6 resize-none focus:outline-none bg-transparent dark:text-white placeholder-gray-400 dark:placeholder-gray-600"
                x-model="contentMarkdown"
                @input="validateMarkdownSize"
                @input.debounce.10000ms="saveRevision"
                @scroll="syncLineNumbersGutter"
                @keydown="handleKeyboardShortcut"
                x-ref="textarea"
                placeholder="Enter markdown..."
              ></textarea>

              <div
                class="absolute bottom-3 right-4 flex gap-3 text-xs font-medium text-gray-400 dark:text-gray-600 pointer-events-none select-none"
              >
                <span x-text="`${charCount} chars`"></span>
                <span x-text="`${wordCount} words`"></span>
                <span x-text="`${lineCountMetric} lines`"></span>
              </div>
            </div>
          </div>

          <div
            class="p-4 border rounded-lg text-xs font-medium hidden lg:flex lg:justify-between lg:items-center mt-4"
            :class="surfacePanelClass"
          >
            <p> Created with a single HTML file. </p>

            <p>
              View on
              <a
                href="https://github.com/markmead/tiny-markdown"
                target="_blank"
                rel="noreferrer"
                class="inline-block underline transition focus:outline-none focus:text-pink-500 hover:text-pink-500"
              >
                GitHub
              </a>
            </p>

        <div
          class="h-full px-4 py-8 overflow-auto bg-white lg:h-screen dark:bg-black sm:px-6 lg:px-8 lg:py-12"
          :class="{ 'hidden': isFullscreen }"
        >
          <article
            role="region"
            aria-label="Markdown preview"
            class="prose max-w-none dark:prose-invert dark:prose-pre:bg-[#111] prose-checkbox:mr-1 prose-checkbox:-mt-1 dark:checked:prose-checkbox:bg-[#111] prose-checkbox:text-black prose-checkbox:rounded prose-checkbox:size-5 dark:checked:prose-checkbox:bg-blue-600 dark:checked:prose-checkbox:border-blue-600 checked:prose-checkbox:bg-blue-500 checked:prose-checkbox:border-blue-500 prose-checkbox:border-[#EAEAEA] prose-checkbox:bg-white dark:prose-checkbox:border-[#333] dark:prose-checkbox:bg-[#111]"
            x-html="contentHtml"
          ></article>
        </div>
      </div>
    </main>

    <div
      x-cloak
      x-transition
      x-show="notificationMessages.length"
      class="fixed inset-x-0 bottom-4 flex flex-col items-center gap-2 px-4 pointer-events-none"
    >
      <template
        x-for="notificationMessage in notificationMessages"
        :key="notificationMessage.notificationId"
      >
        <div
          x-show="notificationMessage.isVisible"
          x-transition:enter="transform transition ease-out duration-200"
          x-transition:enter-start="translate-y-2 opacity-0 scale-95"
          x-transition:enter-end="translate-y-0 opacity-100 scale-100"
          x-transition:leave="transform transition ease-in duration-150"
          x-transition:leave-start="translate-y-0 opacity-100 scale-100"
          x-transition:leave-end="translate-y-2 opacity-0 scale-95"
          role="alert"
          aria-live="assertive"
          class="p-4 border rounded-lg text-sm font-medium pointer-events-auto"
          :class="surfacePanelClass"
          x-text="notificationMessage.textContent"
        ></div>
      </template>
    </div>

    <script>
      const REVISION_PREFIX = '_TM_'
      const NOTIFICATION_DURATION = 2500
      const NOTIFICATION_LEAVE_DURATION = 150
      const MAX_MARKDOWN_SIZE = 50000
      const DEFAULT_REVISION_LABEL = 'Latest Revision'
      const DEFAULT_REVISION_KEY = null

      const revisionStore = {
        saveEntry(markdownContent) {
          localStorage.setItem(
            `${REVISION_PREFIX}${new Date().getTime()}`,
            `${markdownContent}`,
          )
        },

        removeEntry(localStorageRevisionKey) {
          localStorage.removeItem(localStorageRevisionKey)
        },

        removeAllEntries() {
          const localStorageRevisionKeys = Object.keys(localStorage).filter(
            (localStorageKey) => localStorageKey.startsWith(REVISION_PREFIX),
          )

          localStorageRevisionKeys.forEach((localStorageRevisionKey) =>
            localStorage.removeItem(localStorageRevisionKey),
          )
        },

        listEntries() {
          const localStorageRevisions = Object.keys(localStorage)
            .filter((localStorageKey) =>
              localStorageKey.startsWith(REVISION_PREFIX),
            )
            .sort((firstDate, secondDate) => {
              const firstDateAsTimestamp = firstDate.replace(
                REVISION_PREFIX,
                '',
              )

              const secondDateAsTimestamp = secondDate.replace(
                REVISION_PREFIX,
                '',
              )

              return (
                new Date(Number(secondDateAsTimestamp)) -
                new Date(Number(firstDateAsTimestamp))
              )
            })

          return localStorageRevisions.map((localStorageRevisionKey) => {
            const localStorageRevisionKeyAsTimestamp =
              localStorageRevisionKey.replace(REVISION_PREFIX, '')

            const formattedDate = new Date(
              Number(localStorageRevisionKeyAsTimestamp),
            ).toLocaleString()

            return {
              revisionKey: localStorageRevisionKey,
              revisionLabel: formattedDate,
            }
          })
        },

        getEntry(localStorageRevisionKey) {
          return localStorage.getItem(localStorageRevisionKey)
        },
      }

      const markdownService = {
        applySyntaxMarkers(
          textBeforeSelection,
          textAfterSelection,
          selectedText,
          syntaxBefore,
          syntaxAfter = '',
        ) {
          return syntaxBefore === '```'
            ? `${textBeforeSelection}${syntaxBefore}\n${selectedText}\n${syntaxAfter}${textAfterSelection}`
            : `${textBeforeSelection}${syntaxBefore}${selectedText}${syntaxAfter}${textAfterSelection}`
        },

        stripSyntaxMarkers(
          textBeforeSelection,
          textAfterSelection,
          selectedText,
          syntaxBefore,
          syntaxAfter = '',
        ) {
          const updatedSelectedMarkdown = selectedText
            .replace(syntaxBefore, '')
            .replace(syntaxAfter, '')

          return `${textBeforeSelection}${updatedSelectedMarkdown}${textAfterSelection}`
        },

        enforceSizeLimit(markdownContent) {
          if (markdownContent.length <= MAX_MARKDOWN_SIZE) {
            return {
              validatedContent: markdownContent,
              exceedsSizeLimit: false,
            }
          }

          return {
            validatedContent: markdownContent.substring(0, MAX_MARKDOWN_SIZE),
            exceedsSizeLimit: true,
          }
        },

        renderSanitizedHtml(markdownContent) {
          try {
            const rawHtml = marked.parse(markdownContent)

            return {
              sanitizedHtml: DOMPurify.sanitize(rawHtml),
              containsParseError: false,
            }
          } catch {
            return {
              sanitizedHtml: `<p>${DOMPurify.sanitize(markdownContent, {
                ALLOWED_TAGS: [],
                ALLOWED_ATTR: [],
                ALLOW_ARIA_ATTR: false,
                ALLOW_DATA_ATTR: false,
              })}</p>`,
              containsParseError: true,
            }
          }
        },
      }

      const exportService = {
        createFileName(fileExtension) {
          const exportTimestamp = Date.now()

          return `tiny-markdown-${exportTimestamp}.${fileExtension}`
        },

        downloadFile(fileContent, fileName, fileType) {
          const exportBlob = new Blob([fileContent], { type: fileType })
          const exportUrl = URL.createObjectURL(exportBlob)
          const exportLink = document.createElement('a')

          exportLink.href = exportUrl
          exportLink.download = fileName

          exportLink.click()

          URL.revokeObjectURL(exportUrl)
        },

        exportMarkdown(markdownContent) {
          this.downloadFile(
            markdownContent,
            this.createFileName('md'),
            'text/markdown;charset=utf-8',
          )
        },
      }

      const notificationService = {
        createNotification(textContent) {
          const notificationId = Date.now() + Math.random()

          return {
            notificationId,
            textContent,
            isVisible: false,
          }
        },

        addNotification(notificationMessages, notificationMessage) {
          return [...notificationMessages, notificationMessage]
        },

        setNotificationVisibility(
          notificationMessages,
          notificationId,
          isVisible,
        ) {
          return notificationMessages.map((currentNotification) =>
            currentNotification.notificationId === notificationId
              ? { ...currentNotification, isVisible }
              : currentNotification,
          )
        },

        removeNotification(notificationMessages, notificationId) {
          return notificationMessages.filter(
            (currentNotification) =>
              currentNotification.notificationId !== notificationId,
          )
        },

        addTimeout(notificationTimeouts, notificationId, timeoutId) {
          return {
            ...notificationTimeouts,
            [notificationId]: timeoutId,
          }
        },

        removeTimeout(notificationTimeouts, notificationId) {
          return Object.fromEntries(
            Object.entries(notificationTimeouts).filter(
              ([timeoutNotificationId]) =>
                Number(timeoutNotificationId) !== notificationId,
            ),
          )
        },

        findNotification(notificationMessages, notificationId) {
          return notificationMessages.find(
            (currentNotification) =>
              currentNotification.notificationId === notificationId,
          )
        },
      }

      document.addEventListener('alpine:init', () => {
        /**
         * Main Alpine.js component for TinyMarkdown editor
         * @description
         * Real-time markdown editor with live preview, secure sanitization, revision history,
         * and persistent preferences. Manages all editor state and user interactions.
         *
         * Features:
         * - Live HTML preview with XSS protection (DOMPurify sanitization)
         * - Revision history saved to localStorage with timestamps
         * - Dark mode toggle with persistent user preference
         * - Toolbar with markdown formatting shortcuts
         * - 50KB size limit for optimal performance
         * - Keyboard shortcuts (Ctrl/Cmd+B bold, Ctrl/Cmd+I italic, Ctrl/Cmd+K code, Ctrl/Cmd+F search)
         * - Character, word and line count metrics
         * - Optional line numbers gutter with scroll sync
         * - Search and replace panel
         * - Separation of concerns via markdownService and revisionStore helpers
         *
         * Data Properties:
         * - contentMarkdown: Current markdown text (persisted to browser storage)
         * - contentHtml: Rendered HTML preview (sanitized for security)
         * - contentRevisions: Array of timestamped revision objects
         * - surfacePanelClass: Shared Tailwind class string for bordered UI surfaces
         * - toolbarGroupClass: Shared Tailwind class string for grouped button wrappers
         * - toolbarButtonClass: Shared Tailwind class string for square toolbar buttons
         * - searchActionButtonClass: Shared Tailwind class string for text action buttons
         * - menuTriggerButtonClass: Shared Tailwind class string for revision menu trigger
         * - notificationMessages: Active notification queue for stacked alerts
         * - notificationTimeouts: Timeout ids keyed by notification id
         * - isFullscreen: Boolean toggle to hide preview pane for full-width editing
         * - showRevisionMenu: Boolean toggle for revision menu visibility
         * - showLineNumbers: Boolean toggle for line numbers gutter
         * - showSearchPanel: Boolean toggle for search/replace panel
         * - searchTerm: Current search string
         * - replaceTerm: Current replacement string
         */
        Alpine.data('fakeCms', () => ({
          contentMarkdown: Alpine.$persist('# Hello there...'),
          contentHtml: '',
          contentRevisions: [],
          surfacePanelClass:
            'dark:border-[#333] dark:bg-black dark:text-white bg-white border-[#EAEAEA]',
          toolbarGroupClass:
            'flex items-center gap-1 p-1 border rounded-lg border-[#EAEAEA] bg-white dark:border-[#333] dark:bg-black',
          toolbarButtonClass:
            'size-8 rounded-md grid place-content-center text-xs font-medium dark:text-white text-black transition-colors hover:bg-[#F3F3F3] dark:hover:bg-[#1A1A1A] active:bg-[#EDEDED] dark:active:bg-[#222] focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-pink-500 focus-visible:ring-inset',
          searchActionButtonClass:
            'h-8 px-3 rounded-md text-xs font-medium dark:text-white text-black transition-colors hover:bg-[#F3F3F3] dark:hover:bg-[#1A1A1A] active:bg-[#EDEDED] dark:active:bg-[#222] focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-pink-500 focus-visible:ring-inset',
          menuTriggerButtonClass:
            'h-8 px-2 rounded-md dark:text-white text-black transition-colors hover:bg-[#F3F3F3] dark:hover:bg-[#1A1A1A] active:bg-[#EDEDED] dark:active:bg-[#222] focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-pink-500 focus-visible:ring-inset flex items-center gap-2',
          selectedRevisionKey: DEFAULT_REVISION_KEY,
          selectedRevisionLabel: DEFAULT_REVISION_LABEL,
          notificationMessages: [],
          notificationTimeouts: {},
          isFullscreen: Alpine.$persist(false),
          showRevisionMenu: false,
          showLineNumbers: false,
          showSearchPanel: false,
          searchTerm: '',
          replaceTerm: '',

          get charCount() {
            return this.contentMarkdown.length
          },

          get wordCount() {
            const trimmed = this.contentMarkdown.trim()
            return trimmed ? trimmed.split(/\s+/).length : 0
          },

          get lineCountMetric() {
            return this.contentMarkdown.split('\n').length
          },

          get editorLineNumbers() {
            const count = this.contentMarkdown.split('\n').length
            return Array.from({ length: count }, (_, i) => i + 1)
          },

          get matchCount() {
            if (!this.searchTerm) return 0
            let count = 0
            let pos = 0
            const term = this.searchTerm
            const content = this.contentMarkdown
            while ((pos = content.indexOf(term, pos)) !== -1) {
              count++
              pos += term.length
            }
            return count
          },

          get matchCountText() {
            const count = this.matchCount
            return count === 0
              ? 'No matches'
              : `${count} match${count === 1 ? '' : 'es'}`
          },

          /**
           * Initializes component state
           * @description Loads persisted revisions into the revision dropdown on startup.
           */
          init() {
            this.setRevisions()
          },

          /**
           * Closes the revision menu and optionally returns focus to the trigger button
           * @param {boolean} shouldFocusTrigger - Whether to focus the trigger after closing
           * @description Skips focus restoration for click-away close to avoid stealing focus.
           */
          closeRevisionMenu(shouldFocusTrigger = true) {
            this.showRevisionMenu = false

            if (shouldFocusTrigger) {
              this.$refs.revisionMenuTrigger.focus()
            }
          },

          /**
           * Toggles revision menu visibility
           * @description Delegates open and close behavior to dedicated handlers.
           */
          toggleRevisionMenu() {
            if (this.showRevisionMenu) {
              this.closeRevisionMenu()

              return
            }

            this.showRevisionMenu = true
          },

          /**
           * Loads a selected revision and closes the revision menu
           * @param {string} localStorageRevisionKey - The localStorage key of revision to load
           * @param {string} localStorageRevisionLabel - Display label for the selected revision
           * @description Loads selected revision content and restores focus to the menu trigger.
           */
          selectRevision(localStorageRevisionKey, localStorageRevisionLabel) {
            this.useRevision(localStorageRevisionKey, localStorageRevisionLabel)
            this.closeRevisionMenu()
          },

          /**
           * Deletes one revision and closes the revision menu
           * @param {string} localStorageRevisionKey - The localStorage key of revision to delete
           * @description Removes a single revision entry and returns focus to the menu trigger.
           */
          removeRevision(localStorageRevisionKey) {
            this.deleteRevision(localStorageRevisionKey)
            this.closeRevisionMenu()
          },

          /**
           * Deletes all revisions and closes the revision menu
           * @description Clears revision history and restores focus to the menu trigger.
           */
          removeAllRevisions() {
            this.deleteRevisions()
            this.closeRevisionMenu()
          },

          /**
           * Wraps or unwraps selected text with markdown syntax markers
           * @param {string} syntaxBefore - Opening syntax marker (e.g., '**' for bold)
           * @param {string} syntaxAfter - Closing syntax marker (e.g., '**' for bold)
           * @description
           * Intelligently toggles formatting - removes syntax if already applied,
           * adds if not. Special handling for code blocks (adds newlines).
           * Returns focus to textarea after modification.
           */
          modifyMarkdown(syntaxBefore, syntaxAfter) {
            const markdownTextarea = this.$refs.textarea

            const markdownTextStart = markdownTextarea.selectionStart
            const markdownTextEnd = markdownTextarea.selectionEnd

            const markdownSelectedText = markdownTextarea.value.slice(
              markdownTextStart,
              markdownTextEnd,
            )

            const markdownTextBeforeSelection = markdownTextarea.value.slice(
              0,
              markdownTextStart,
            )

            const markdownTextAfterSelection =
              markdownTextarea.value.slice(markdownTextEnd)

            this.contentMarkdown = markdownSelectedText.includes(syntaxBefore)
              ? this.modifyMarkdownRemove(
                  markdownTextBeforeSelection,
                  markdownTextAfterSelection,
                  markdownSelectedText,
                  syntaxBefore,
                  syntaxAfter,
                )
              : this.modifyMarkdownAdd(
                  markdownTextBeforeSelection,
                  markdownTextAfterSelection,
                  markdownSelectedText,
                  syntaxBefore,
                  syntaxAfter,
                )

            markdownTextarea.focus()
          },

          /**
           * Adds syntax markers around selected text
           * @param {string} textBeforeSelection - Markdown content before selection
           * @param {string} textAfterSelection - Markdown content after selection
           * @param {string} selectedText - Currently selected text to wrap
           * @param {string} syntaxBefore - Opening syntax marker to apply
           * @param {string} syntaxAfter - Closing syntax marker (optional)
           * @returns {string} Modified markdown with syntax applied
           * @description Special handling for code blocks (```) adds newlines for readability.
           */
          modifyMarkdownAdd(
            textBeforeSelection,
            textAfterSelection,
            selectedText,
            syntaxBefore,
            syntaxAfter = '',
          ) {
            return markdownService.applySyntaxMarkers(
              textBeforeSelection,
              textAfterSelection,
              selectedText,
              syntaxBefore,
              syntaxAfter,
            )
          },

          /**
           * Removes syntax markers from selected text
           * @param {string} textBeforeSelection - Markdown content before selection
           * @param {string} textAfterSelection - Markdown content after selection
           * @param {string} selectedText - Currently selected text to unwrap
           * @param {string} syntaxBefore - Opening syntax marker to remove
           * @param {string} syntaxAfter - Closing syntax marker to remove (optional)
           * @returns {string} Modified markdown with syntax removed
           * @description Removes first occurrence of each marker from selection.
           */
          modifyMarkdownRemove(
            textBeforeSelection,
            textAfterSelection,
            selectedText,
            syntaxBefore,
            syntaxAfter = '',
          ) {
            return markdownService.stripSyntaxMarkers(
              textBeforeSelection,
              textAfterSelection,
              selectedText,
              syntaxBefore,
              syntaxAfter,
            )
          },

          /**
           * Copies current markdown content to clipboard
           * @description Shows success notification on copy and error notification on failure.
           */
          async copyMarkdown() {
            try {
              await navigator.clipboard.writeText(this.contentMarkdown)

              this.showNotification('🎉 Copied to clipboard!')
            } catch {
              this.showNotification('❌ Unable to copy to clipboard')
            }
          },

          /**
           * Validates markdown content doesn't exceed 50KB size limit
           * @description
           * Truncates content in real-time if limit is exceeded.
           * Called on every input change for immediate feedback.
           * Shows notification when limit is reached.
           */
          validateMarkdownSize() {
            const markdownSizeValidation = markdownService.enforceSizeLimit(
              this.contentMarkdown,
            )

            this.contentMarkdown = markdownSizeValidation.validatedContent

            if (markdownSizeValidation.exceedsSizeLimit) {
              this.showNotification('❌ Content limited to 50KB')
            }
          },

          /**
           * Saves current markdown as a timestamped revision to localStorage
           * @description
           * Stores with key pattern _TM_{timestamp}. Auto-triggered after 10s of inactivity
           * (debounced) and manually via Save Revision button. Updates revision list after save.
           */
          saveRevision() {
            revisionStore.saveEntry(this.contentMarkdown)

            this.setRevisions()
          },

          /**
           * Deletes a single revision from localStorage
           * @param {string} localStorageRevisionKey - The localStorage key of revision to delete
           * @description Updates revision list after deletion.
           */
          deleteRevision(localStorageRevisionKey) {
            revisionStore.removeEntry(localStorageRevisionKey)

            if (this.selectedRevisionKey === localStorageRevisionKey) {
              this.selectedRevisionKey = DEFAULT_REVISION_KEY
              this.selectedRevisionLabel = DEFAULT_REVISION_LABEL
            }

            this.setRevisions()
          },

          /**
           * Deletes all revisions from localStorage
           * @description Clears entire revision history. Updates revision list after deletion.
           */
          deleteRevisions() {
            revisionStore.removeAllEntries()

            this.selectedRevisionKey = DEFAULT_REVISION_KEY
            this.selectedRevisionLabel = DEFAULT_REVISION_LABEL

            this.setRevisions()
          },

          /**
           * Loads and displays all timestamped revisions from localStorage
           * @description
           * Queries localStorage for all _TM_* keys, sorts by timestamp (newest first),
           * formats timestamps to locale strings, and updates revision array for rendering.
           * Called after save/delete operations to refresh revision menu.
           */
          setRevisions() {
            this.contentRevisions = revisionStore.listEntries()

            const selectedRevisionExists = this.contentRevisions.some(
              (contentRevision) =>
                contentRevision.revisionKey === this.selectedRevisionKey,
            )

            if (!selectedRevisionExists) {
              this.selectedRevisionKey = DEFAULT_REVISION_KEY
              this.selectedRevisionLabel = DEFAULT_REVISION_LABEL
            }
          },

          /**
           * Loads a previous revision into the editor
           * @param {string} localStorageRevisionKey - The localStorage key of revision to load
           * @param {string} localStorageRevisionLabel - Display label for the revision (formatted date)
           * @description Replaces current content with selected revision and updates UI label.
           */
          useRevision(localStorageRevisionKey, localStorageRevisionLabel) {
            this.contentMarkdown = revisionStore.getEntry(
              localStorageRevisionKey,
            )

            this.selectedRevisionKey = localStorageRevisionKey
            this.selectedRevisionLabel = localStorageRevisionLabel
          },

          /**
           * Exports current markdown content as a .md file
           * @description Creates a timestamped markdown file download in the browser.
           */
          exportMarkdownDocument() {
            exportService.exportMarkdown(this.contentMarkdown)

            this.showNotification('🎉 Exported as markdown')
          },

          /**
           * Parses markdown to HTML and sanitizes for secure display
           * @description
           * Uses marked.js to convert markdown to HTML and sanitizes output with DOMPurify
           * to prevent XSS attacks. If parsing fails, uses a strict DOMPurify allowlist
           * to render the raw markdown content as sanitized fallback output.
           * Called reactively whenever contentMarkdown changes.
           */
          refreshHtml() {
            const renderedMarkdown = markdownService.renderSanitizedHtml(
              this.contentMarkdown,
            )

            this.contentHtml = renderedMarkdown.sanitizedHtml

            if (renderedMarkdown.containsParseError) {
              this.showNotification(
                '⚠️ Markdown parsing error - preview unavailable',
              )
            }
          },

          /**
           * Displays a temporary notification message to the user
           * @param {string} textContent - Message text to display (supports emojis)
           * @description
           * Adds a notification to the queue and auto-hides it after 2.5 seconds.
           * Multiple notifications can be displayed concurrently.
           */
          showNotification(textContent) {
            const notificationMessage =
              notificationService.createNotification(textContent)

            this.notificationMessages = notificationService.addNotification(
              this.notificationMessages,
              notificationMessage,
            )

            // Trigger enter transition after the node exists in the DOM.
            this.$nextTick(() => {
              this.notificationMessages =
                notificationService.setNotificationVisibility(
                  this.notificationMessages,
                  notificationMessage.notificationId,
                  true,
                )
            })

            const timeoutId = setTimeout(
              () => this.hideNotification(notificationMessage.notificationId),
              NOTIFICATION_DURATION,
            )

            this.notificationTimeouts = notificationService.addTimeout(
              this.notificationTimeouts,
              notificationMessage.notificationId,
              timeoutId,
            )
          },

          /**
           * Starts leave transition for a notification and removes it after animation.
           * @param {number} notificationId - The unique id of the notification
           */
          hideNotification(notificationId) {
            const notificationToHide = notificationService.findNotification(
              this.notificationMessages,
              notificationId,
            )

            if (!notificationToHide) {
              return
            }

            const timeoutId = this.notificationTimeouts[notificationId]

            if (timeoutId) {
              clearTimeout(timeoutId)
            }

            this.notificationMessages =
              notificationService.setNotificationVisibility(
                this.notificationMessages,
                notificationId,
                false,
              )

            const newTimeoutId = setTimeout(
              () => this.removeNotification(notificationId),
              NOTIFICATION_LEAVE_DURATION,
            )

            this.notificationTimeouts = notificationService.addTimeout(
              this.notificationTimeouts,
              notificationId,
              newTimeoutId,
            )
          },

          /**
           * Removes a notification by id and clears its pending timer
           * @param {number} notificationId - The unique id of the notification
           */
          removeNotification(notificationId) {
            const timeoutId = this.notificationTimeouts[notificationId]

            if (timeoutId) {
              clearTimeout(timeoutId)

              this.notificationTimeouts = notificationService.removeTimeout(
                this.notificationTimeouts,
                notificationId,
              )
            }

            this.notificationMessages = notificationService.removeNotification(
              this.notificationMessages,
              notificationId,
            )
          },

          /**
           * Resets editor to initial state
           * @description Sets markdown to default greeting message.
           */
          refreshComponent() {
            this.contentMarkdown = '# Hello there...'
          },

          /**
           * Toggles between full-width and split-pane layout
           * @description Hides preview pane when fullscreen is enabled for distraction-free editing.
           */
          toggleFullscreen() {
            this.isFullscreen = !this.isFullscreen
          },

          /**
           * Handles keyboard shortcuts fired within the textarea
           * @param {KeyboardEvent} event - The keyboard event
           * @description
           * Ctrl/Cmd+B: bold, Ctrl/Cmd+I: italic, Ctrl/Cmd+K: inline code,
           * Ctrl/Cmd+F: open search panel.
           */
          handleKeyboardShortcut(event) {
            const ctrlOrMeta = event.metaKey || event.ctrlKey

            if (!ctrlOrMeta) return

            if (event.key === 'b') {
              event.preventDefault()
              this.modifyMarkdown('**', '**')
            } else if (event.key === 'i') {
              event.preventDefault()
              this.modifyMarkdown('_', '_')
            } else if (event.key === 'k') {
              event.preventDefault()
              this.modifyMarkdown('`', '`')
            } else if (event.key === 'f') {
              event.preventDefault()
              this.openSearchPanel()
            }
          },

          /**
           * Opens the search/replace panel and focuses the search input
           */
          openSearchPanel() {
            this.showSearchPanel = true
            this.$nextTick(() => this.$refs.searchInput?.focus())
          },

          /**
           * Closes the search/replace panel
           */
          closeSearchPanel() {
            this.showSearchPanel = false
          },

          /**
           * Selects the next occurrence of searchTerm in the textarea
           * @description Wraps around to the beginning when the end of content is reached.
           */
          findNextMatch() {
            if (!this.searchTerm) return

            const content = this.contentMarkdown
            const term = this.searchTerm
            const textarea = this.$refs.textarea
            const start = textarea.selectionEnd ?? 0

            let index = content.indexOf(term, start)

            if (index === -1) {
              index = content.indexOf(term, 0)
            }

            if (index !== -1) {
              textarea.focus()
              textarea.setSelectionRange(index, index + term.length)
              const linesBefore = content.substring(0, index).split('\n').length
              const lineHeight =
                parseFloat(getComputedStyle(textarea).lineHeight) || 24
              textarea.scrollTop = (linesBefore - 1) * lineHeight
            }
          },

          /**
           * Replaces the currently selected match and advances to the next one
           * @description If the selection does not match searchTerm, advances without replacing.
           */
          replaceCurrentMatch() {
            if (!this.searchTerm) return

            const textarea = this.$refs.textarea
            const selStart = textarea.selectionStart
            const selEnd = textarea.selectionEnd
            const selected = this.contentMarkdown.substring(selStart, selEnd)

            if (selected === this.searchTerm) {
              this.contentMarkdown =
                this.contentMarkdown.substring(0, selStart) +
                this.replaceTerm +
                this.contentMarkdown.substring(selEnd)
            }

            this.$nextTick(() => this.findNextMatch())
          },

          /**
           * Replaces every occurrence of searchTerm with replaceTerm
           * @description Shows a notification with the number of replacements made.
           */
          replaceAllMatches() {
            if (!this.searchTerm) return

            const count = this.matchCount

            if (count === 0) return

            this.contentMarkdown = this.contentMarkdown.replaceAll(
              this.searchTerm,
              this.replaceTerm,
            )

            this.showNotification(
              `🎉 Replaced ${count} occurrence${count === 1 ? '' : 's'}`,
            )
          },

          /**
           * Syncs the line numbers gutter scroll position with the textarea
           */
          syncLineNumbersGutter() {
            if (!this.showLineNumbers) return

            const gutter = this.$refs.lineNumbersGutter

            if (gutter) {
              gutter.scrollTop = this.$refs.textarea.scrollTop
            }
          },
        }))
      })
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked@17.0/lib/marked.umd.min.js"></script>
  </body>
</html>
